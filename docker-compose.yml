services:
  # ─── AI 推理引擎 ──────────────────────────────────────────────
  # 针对 i7-9700 (8核)、16GB 内存的 NAS 优化配置
  ollama:
    image: docker.1ms.run/ollama/ollama:latest
    container_name: memoir-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ${PHOTO_DIR:-./photos}:/photos:ro
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_THREAD=8
    deploy:
      resources:
        limits:
          memory: 14G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - memoir_net

  # ─── 照片推送系统 ──────────────────────────────────────────────
  # config.json 可选：首次运行自动生成，或通过环境变量覆盖配置
  # 使用方式: docker compose --profile cli run --rm memoir
  memoir:
    build: .
    image: muskcheng/memoir:latest
    container_name: memoir
    restart: "no"
    volumes:
      - ${PHOTO_DIR:-./photos}:/photos:ro
      - ${DATA_DIR:-./data}:/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PHOTO_DIR=/photos
      - DATA_DIR=/data
      - API_KEY=${API_KEY:-}
      - DEVICE_MAC=${DEVICE_MAC:-}
      - TZ=Asia/Shanghai
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - memoir_net
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - cli

  # ─── Web 管理后台 ──────────────────────────────────────────────
  webui:
    build: .
    image: muskcheng/memoir:latest
    container_name: memoir-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-5000}:5000"
    volumes:
      - ${PHOTO_DIR:-./photos}:/photos:ro
      - ${DATA_DIR:-./data}:/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - PHOTO_DIR=/photos
      - DATA_DIR=/data
      - API_KEY=${API_KEY:-}
      - DEVICE_MAC=${DEVICE_MAC:-}
      - WEBUI_PORT=5000
      - TZ=Asia/Shanghai
    command: ["python3", "webui/app.py"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - memoir_net
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:

networks:
  memoir_net:
    driver: bridge
